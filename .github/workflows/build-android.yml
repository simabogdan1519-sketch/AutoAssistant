name: Build AutoAssistant APK + AAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Set versionCode from GitHub run number
        run: |
          # Auto-increment versionCode la fiecare build (cerință Play Store pentru update-uri)
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            config.expo.android = config.expo.android || {};
            config.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
            console.log('versionCode setat la', ${{ github.run_number }});
          "

      - name: Expo prebuild (generate Android native project)
        run: npx expo prebuild --platform android --clean

      - name: Setup keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "No keystore secret found — generating a dev keystore"
            keytool -genkey -v \
              -keystore android/app/upload.keystore \
              -alias autoassistant \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass autopass \
              -keypass autopass \
              -dname "CN=AutoAssistant, OU=Dev, O=AutoAssistant, L=Bucharest, S=RO, C=RO"
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload.keystore
          fi

      - name: Configure signing via gradle.properties
        env:
          STORE_PASS: ${{ secrets.STORE_PASS || 'autopass' }}
          KEY_PASS: ${{ secrets.KEY_PASS || 'autopass' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'autoassistant' }}
        run: |
          cat >> android/gradle.properties << EOF

          MYAPP_UPLOAD_STORE_FILE=upload.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${KEY_ALIAS}
          MYAPP_UPLOAD_STORE_PASSWORD=${STORE_PASS}
          MYAPP_UPLOAD_KEY_PASSWORD=${KEY_PASS}
          EOF

      - name: Patch build.gradle for release signing
        run: |
          # Înlocuim signingConfig din release buildType (care default e debug) cu un nou signingConfig release
          # folosind proprietățile din gradle.properties
          node -e "
            const fs = require('fs');
            const path = 'android/app/build.gradle';
            let gradle = fs.readFileSync(path, 'utf8');

            // 1. Adaugă signingConfig 'release' în signingConfigs block (după 'debug')
            const signingConfigBlock = \`
                release {
                    if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                        storeFile file(MYAPP_UPLOAD_STORE_FILE)
                        storePassword MYAPP_UPLOAD_STORE_PASSWORD
                        keyAlias MYAPP_UPLOAD_KEY_ALIAS
                        keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                    }
                }\`;

            // Inserează după 'debug {' din signingConfigs
            gradle = gradle.replace(
              /(signingConfigs\s*\{[\s\S]*?debug\s*\{[\s\S]*?\})/,
              '\$1' + signingConfigBlock
            );

            // 2. Schimbă signingConfig din buildTypes.release de la debug la release
            gradle = gradle.replace(
              /(buildTypes\s*\{[\s\S]*?release\s*\{[\s\S]*?)signingConfig\s+signingConfigs\.debug/,
              '\$1signingConfig signingConfigs.release'
            );

            fs.writeFileSync(path, gradle);
            console.log('build.gradle patched for release signing');
          "
          echo '=== Rezultat build.gradle ==='
          grep -A 20 'signingConfigs' android/app/build.gradle | head -30

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK (release, signed)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build App Bundle (for Play Store)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autoassistant-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: autoassistant-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
